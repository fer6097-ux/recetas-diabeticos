  <script>
    (function() {
      function showPopup() {
        var popup = document.getElementById('discount-popup');
        var card = document.getElementById('discount-card');
        popup.style.display = 'flex';
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            card.style.transform = 'translateY(0) scale(1)';
            card.style.opacity = '1';
          });
        });
        window.removeEventListener('scroll', onScroll);
      }

      function onScroll() {
        var scrolled = window.scrollY + window.innerHeight;
        var total = document.documentElement.scrollHeight;
        if (scrolled / total >= 0.75) showPopup();
      }

      window.addEventListener('scroll', onScroll, { passive: true });
    })();

    function closePopup() {
      var card = document.getElementById('discount-card');
      card.style.transform = 'translateY(24px) scale(.96)';
      card.style.opacity = '0';
      setTimeout(function() {
        document.getElementById('discount-popup').style.display = 'none';
      }, 350);
    }

    function copyCoupon() {
      navigator.clipboard.writeText('PRUEBA10').then(function() {
        document.getElementById('copy-icon').textContent = '✅';
        document.getElementById('copy-text').textContent = '¡Copiado!';
        document.getElementById('copy-btn').style.background = '#156330';
        setTimeout(function() {
          document.getElementById('copy-icon').textContent = '📋';
          document.getElementById('copy-text').textContent = 'Copiar';
          document.getElementById('copy-btn').style.background = '#1a7a3c';
        }, 2500);
      });
    }

    document.getElementById('discount-popup').addEventListener('click', function(e) {
      if (e.target === this) closePopup();
    });
  </script>
